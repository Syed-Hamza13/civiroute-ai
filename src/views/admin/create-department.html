<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Department - CiviRoute AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- NAVBAR -->
    <div class="bg-white shadow-sm border-b border-slate-200">

        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">

            <h1 class="text-xl font-bold text-slate-800">
                Create Department
            </h1>

            <a href="/admin/dashboard" class="text-sm text-slate-600 hover:text-blue-600">
                Back to Admin
            </a>

        </div>

    </div>

    <!-- MAIN -->
    <div class="max-w-3xl mx-auto px-4 py-10">

        <div class="bg-white rounded-2xl shadow p-6">

            <h2 class="text-2xl font-bold text-slate-800 mb-6">
                Department Registration Form
            </h2>

            <form action="/admin/departments/create" method="POST" class="space-y-5">

                <!-- DEPARTMENT TYPE -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        Department Type
                    </label>

                    <select name="department_type_id"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        required>
                        <option value="">Select Department</option>
                        <option value="1">Water Supply</option>
                        <option value="2">Electricity</option>
                        <option value="3">Roads</option>
                        <option value="4">Sanitation</option>
                        <option value="5">Public Services</option>
                    </select>

                </div>

                <!-- STATE -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        State
                    </label>

                    <select id="stateSelect" name="state_id"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        required>
                        <option value="">
                            Loading states...
                        </option>
                    </select>

                </div>

                <!-- CITY -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        City
                    </label>

                    <select id="citySelect" name="city_id"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        required>
                        <option value="">
                            Select state first
                        </option>
                    </select>

                </div>

                <!-- OFFICE NAME -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        Office Name
                    </label>

                    <input type="text" name="office_name"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        placeholder="e.g. Bhopal Electricity Office" required>

                </div>

                <!-- CONTACT ROW -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <div>
                        <label class="text-sm font-medium text-slate-700">
                            Email
                        </label>

                        <input type="email" name="email"
                            class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                            placeholder="department@email.com">
                    </div>

                    <div>
                        <label class="text-sm font-medium text-slate-700">
                            Mobile
                        </label>

                        <input type="text" name="mobile"
                            class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                            placeholder="10 digit number">
                    </div>

                </div>

                <!-- LOGIN INFO -->
                <div class="bg-slate-50 p-4 rounded-xl space-y-4">

                    <h3 class="font-semibold text-slate-800">
                        Login Credentials
                    </h3>

                    <input type="text" name="username" placeholder="Username" class="w-full px-4 py-3 border rounded-xl"
                        required>

                    <input type="password" name="password" placeholder="Password"
                        class="w-full px-4 py-3 border rounded-xl" required>

                </div>

                <!-- ADDRESS -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        Address
                    </label>

                    <textarea name="address" rows="4"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        placeholder="Full office address"></textarea>

                </div>

                <!-- PINCODE -->
                <div>

                    <label class="text-sm font-medium text-slate-700">
                        Pincode
                    </label>

                    <input type="text" name="pincode"
                        class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
                        placeholder="e.g. 462001">

                </div>

                <!-- SUBMIT -->
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold shadow-lg shadow-blue-200">
                    Create Department
                </button>

            </form>

        </div>

    </div>

</body>
<script>

    const stateSelect =
        document.getElementById(
            "stateSelect"
        );

    const citySelect =
        document.getElementById(
            "citySelect"
        );


    // ========================
    // LOAD STATES
    // ========================

    async function loadStates() {

        try {

            const response =
                await fetch(
                    "/admin/api/states"
                );

            const states =
                await response.json();

            stateSelect.innerHTML =
                `
      <option value="">
        Select State
      </option>
      `;

            states.forEach((state) => {

                stateSelect.innerHTML += `
        <option value="${state.id}">
          ${state.name}
        </option>
      `;

            });

        } catch (error) {

            console.error(error);

        }

    }


    // ========================
    // LOAD CITIES
    // ========================

    async function loadCities(
        stateId
    ) {

        try {

            citySelect.innerHTML =
                `
      <option>
        Loading cities...
      </option>
      `;

            const response =
                await fetch(
                    `/admin/api/cities/${stateId}`
                );

            const cities =
                await response.json();

            citySelect.innerHTML =
                `
      <option value="">
        Select City
      </option>
      `;

            cities.forEach((city) => {

                citySelect.innerHTML += `
        <option value="${city.id}">
          ${city.name}
        </option>
      `;

            });

        } catch (error) {

            console.error(error);

        }

    }


    // ========================
    // STATE CHANGE EVENT
    // ========================

    stateSelect.addEventListener(
        "change",
        () => {

            const stateId =
                stateSelect.value;

            if (!stateId) {

                citySelect.innerHTML =
                    `
        <option>
          Select state first
        </option>
        `;

                return;

            }

            loadCities(stateId);

        }
    );


    // ========================
    // INITIAL LOAD
    // ========================

    loadStates();

</script>

</html>
