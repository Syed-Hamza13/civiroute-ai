<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Dashboard - CiviRoute AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- NAVBAR -->
    <div class="bg-white shadow-sm border-b border-slate-200">

        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">

            <h1 class="text-xl font-bold text-slate-800">
                Department Panel
            </h1>

            <div class="flex gap-4">

                <a href="/department/dashboard" class="text-sm text-slate-600 hover:text-blue-600">
                    Dashboard
                </a>

                <a href="/logout" class="text-sm text-red-600 hover:text-red-700 font-medium">
                    Logout
                </a>

            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-4 gap-6">

        <!-- STATS -->
        <div class="space-y-4">

            <div class="bg-white rounded-2xl shadow p-5">
                <p class="text-slate-500 text-sm">Total Assigned</p>
                <h2 class="text-2xl font-bold text-slate-800">24</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-5">
                <p class="text-slate-500 text-sm">Pending</p>
                <h2 class="text-2xl font-bold text-yellow-600">10</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-5">
                <p class="text-slate-500 text-sm">Resolved</p>
                <h2 class="text-2xl font-bold text-green-600">12</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-5">
                <p class="text-slate-500 text-sm">Escalated</p>
                <h2 class="text-2xl font-bold text-red-600">2</h2>
            </div>

        </div>

        <!-- COMPLAINT LIST -->
        <div class="lg:col-span-3 space-y-4">

            <!-- HEADER -->
            <div class="bg-white rounded-2xl shadow p-5 flex flex-col md:flex-row justify-between gap-4">

                <h2 class="text-xl font-bold text-slate-800">
                    Assigned Complaints
                </h2>

                <input type="text" placeholder="Search complaints..."
                    class="px-4 py-2 border rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100">

            </div>

            <div id="complaintsContainer" class="space-y-4">
            </div>

        </div>

    </div>

</body>
<script>

    async function loadComplaints() {

        const response =
            await fetch(
                "/department/complaints"
            );

        const data =
            await response.json();

        const complaints =
            data.complaints || [];

        const html =
            complaints.map(c => `

            <div class="
                bg-white
                rounded-2xl
                shadow
                p-5
                border-l-4

                ${c.priority === 'critical'
                    ? 'border-red-700'
                    : ''}

                ${c.priority === 'high'
                    ? 'border-red-500'
                    : ''}

                ${c.priority === 'medium'
                    ? 'border-yellow-500'
                    : ''}

                ${c.priority === 'low'
                    ? 'border-green-500'
                    : ''}
            ">

                <div class="
                    flex
                    flex-col
                    md:flex-row
                    md:items-center
                    md:justify-between
                    gap-3
                ">

                    <div>

                        <h3 class="
                            font-semibold
                            text-slate-800
                        ">
                            ${c.title}
                        </h3>

                        <p class="
                            text-sm
                            text-slate-500
                            mt-1
                        ">
                            Citizen:
                            ${c.full_name}
                        </p>

                    </div>

                    <div class="flex gap-2">

                        <span class="
                            px-3
                            py-1
                            text-xs
                            rounded-full

                            ${c.priority === 'critical'
                    ? 'bg-red-200 text-red-900'
                    : ''}

                            ${c.priority === 'high'
                    ? 'bg-red-100 text-red-700'
                    : ''}

                            ${c.priority === 'medium'
                    ? 'bg-yellow-100 text-yellow-700'
                    : ''}

                            ${c.priority === 'low'
                    ? 'bg-green-100 text-green-700'
                    : ''}
                        ">

                            ${c.priority}

                        </span>

                    </div>

                </div>

                <div class="
                    mt-4
                    bg-slate-50
                    p-4
                    rounded-xl
                    text-sm
                ">

                    <p class="text-slate-700">

                        ${c.description}

                    </p>

                </div>

            </div>

        `).join("");

        document.getElementById(
            "complaintsContainer"
        ).innerHTML = html;
    }

    loadComplaints();

</script>

</html>
