<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verification</title>
</head>

<body>

    <h1>Account Verification</h1>

    <!-- EMAIL VERIFY -->
    <section>
        <h2>Email Verification</h2>

        <form id="emailForm">
            <label>Email OTP</label><br>

            <input type="text" id="emailOtp" required>

            <br><br>

            <button type="submit">
                Verify Email
            </button>
        </form>

        <p id="emailStatus"></p>
    </section>

    <hr>

    <!-- MOBILE VERIFY -->
    <section id="mobileSection" style="display:none;">
        <h2>Mobile Verification</h2>

        <p>
            OTP was sent to your mobile number. Please enter the OTP below to verify your mobile number.
        </p>

        <label>Mobile OTP</label><br>
        <input type="text" id="mobileOtp">

        <br><br>

        <button type="button" id="verifyMobileBtn">
            Verify Mobile
        </button>

        <p id="mobileStatus"></p>
    </section>




    <script>
        // =====================
        // EMAIL VERIFY
        // =====================
        const emailForm =
            document.getElementById("emailForm");

        emailForm.addEventListener(
            "submit",
            async (e) => {
                e.preventDefault();

                const otp =
                    document.getElementById(
                        "emailOtp"
                    ).value;

                const res =
                    await fetch(
                        "/verify-email",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json"
                            },
                            body: JSON.stringify({
                                otp
                            })
                        }
                    );

                const text =
                    await res.text();

                document.getElementById(
                    "emailStatus"
                ).innerText = text;

                if (res.ok) {
                    document.getElementById(
                        "mobileSection"
                    ).style.display = "block";
                    await sendMobileOtp();
                }
            }
        );


        // =====================
        // SEND WHATSAPP OTP
        // =====================

        async function sendMobileOtp() {
            const res = await fetch(
                "/send-mobile-otp",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    }
                }
            );

            const text =
                await res.text();

            document.getElementById(
                "mobileStatus"
            ).innerText = text;
        }



        // =====================
        // VERIFY MOBILE OTP
        // =====================
        document
            .getElementById(
                "verifyMobileBtn"
            )
            .addEventListener(
                "click",
                async () => {

                    const otp =
                        document.getElementById(
                            "mobileOtp"
                        ).value;

                    const res =
                        await fetch(
                            "/verify-mobile",
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type":
                                        "application/json"
                                },
                                body: JSON.stringify({
                                    otp
                                })
                            }
                        );

                    const text =
                        await res.text();

                    document.getElementById(
                        "mobileStatus"
                    ).innerText = text;
                }
            );
            
    </script>


</body>

</html>
