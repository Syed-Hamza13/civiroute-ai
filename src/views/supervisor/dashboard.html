<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Supervisor Dashboard - CiviRoute AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- HEADER -->

    <header class="bg-blue-600 shadow-sm border-b border-blue-700">

        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <div>
                <h1 class="text-2xl font-bold text-white">
                    Supervisor Dashboard
                </h1>

                <p class="text-blue-100 text-sm">
                    Manage and monitor citizen complaints
                </p>
            </div>

            <a href="/logout"
                class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl font-medium transition">
                Logout
            </a>

        </div>

    </header>

    <!-- MAIN -->

    <main class="max-w-7xl mx-auto px-6 py-8">

        <!-- TOP STATS -->

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

            <div class="bg-white rounded-2xl shadow p-5">

                <p class="text-slate-500 text-sm">
                    Total Complaints
                </p>

                <h2 class="text-3xl font-bold text-slate-800 mt-2">
                    6
                </h2>

            </div>

            <div class="bg-white rounded-2xl shadow p-5">

                <p class="text-slate-500 text-sm">
                    Pending Complaints
                </p>

                <h2 class="text-3xl font-bold text-yellow-500 mt-2">
                    2
                </h2>

            </div>

            <div class="bg-white rounded-2xl shadow p-5">

                <p class="text-slate-500 text-sm">
                    Resolved Complaints
                </p>

                <h2 class="text-3xl font-bold text-green-600 mt-2">
                    2
                </h2>

            </div>

        </div>

        <!-- FILTER BAR -->

        <div
            class="bg-white rounded-2xl shadow p-4 mb-6 flex flex-col lg:flex-row gap-4 lg:items-center lg:justify-between">

            <input type="text" id="searchInput" placeholder="Search complaints..."
                class="w-full lg:w-72 border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500" />

            <div class="flex flex-col sm:flex-row gap-3">

                <select id="statusFilter"
                    class="border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500">

                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="in progress">In Progress</option>
                    <option value="resolved">Resolved</option>

                </select>

                <select id="priorityFilter"
                    class="border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500">

                    <option value="all">All Priority</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>

                </select>

            </div>

        </div>

        <!-- COMPLAINT LIST -->

        <div id="complaintsContainer" class="space-y-5"></div>

    </main>

    <script>

        const complaints = [

            {
                title: "Road Damage Near Market Area",
                description: "Large potholes are causing traffic issues and accidents near the main market road.",
                citizen: "Rahul Sharma",
                department: "Road Maintenance",
                priority: "high",
                status: "pending"
            },

            {
                title: "Garbage Collection Delay",
                description: "Garbage has not been collected for the last 5 days in the residential area.",
                citizen: "Anjali Verma",
                department: "Sanitation",
                priority: "medium",
                status: "in progress"
            },

            {
                title: "Street Light Not Working",
                description: "Street lights are not working properly during night time.",
                citizen: "Amit Patel",
                department: "Electric Department",
                priority: "high",
                status: "resolved"
            },

            {
                title: "Water Leakage Issue",
                description: "Continuous water leakage from underground pipe near bus stand.",
                citizen: "Neha Singh",
                department: "Water Supply",
                priority: "medium",
                status: "pending"
            },

            {
                title: "Illegal Parking Problem",
                description: "Vehicles are parked illegally blocking the road movement.",
                citizen: "Rohit Jain",
                department: "Traffic Control",
                priority: "low",
                status: "resolved"
            },

            {
                title: "Drainage Overflow",
                description: "Drainage water overflowing during evening causing bad smell.",
                citizen: "Priya Dubey",
                department: "Drainage Department",
                priority: "high",
                status: "in progress"
            }

        ];

        const complaintsContainer =
            document.getElementById(
                'complaintsContainer'
            );

        const searchInput =
            document.getElementById(
                'searchInput'
            );

        const statusFilter =
            document.getElementById(
                'statusFilter'
            );

        const priorityFilter =
            document.getElementById(
                'priorityFilter'
            );

        function renderComplaints() {

            const searchValue =
                searchInput.value.toLowerCase();

            const statusValue =
                statusFilter.value;

            const priorityValue =
                priorityFilter.value;

            const filteredComplaints =
                complaints.filter(c => {

                    const matchesSearch =
                        c.title.toLowerCase().includes(searchValue) ||
                        c.description.toLowerCase().includes(searchValue);

                    const matchesStatus =
                        statusValue === 'all' ||
                        c.status === statusValue;

                    const matchesPriority =
                        priorityValue === 'all' ||
                        c.priority === priorityValue;

                    return matchesSearch &&
                        matchesStatus &&
                        matchesPriority;
                });

            complaintsContainer.innerHTML =
                filteredComplaints.map((c, index) => `

                <div class="bg-white rounded-2xl shadow p-5">

                    <div class="flex flex-col lg:flex-row lg:justify-between gap-5">

                        <!-- LEFT -->

                        <div class="flex-1">

                            <div class="flex items-center gap-3 mb-3 flex-wrap">

                                <h2 class="text-lg font-semibold text-slate-800">
                                    ${c.title}
                                </h2>

                                <span class="
                                    text-xs font-semibold px-3 py-1 rounded-full

                                    ${c.priority === 'high'
                        ? 'bg-red-100 text-red-700'
                        : ''}

                                    ${c.priority === 'medium'
                        ? 'bg-yellow-100 text-yellow-700'
                        : ''}

                                    ${c.priority === 'low'
                        ? 'bg-green-100 text-green-700'
                        : ''}
                                ">
                                    ${c.priority}
                                </span>

                            </div>

                            <p class="text-slate-600 text-sm leading-relaxed">
                                ${c.description}
                            </p>

                            <!-- IMAGE UPLOAD -->

                            <div class="mt-4">

                                <label
                                    class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-2xl p-5 cursor-pointer hover:bg-slate-50 transition">

                                    <svg xmlns="http://www.w3.org/2000/svg"
                                        class="w-10 h-10 text-slate-400 mb-2"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor">

                                        <path stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M3 15a4 4 0 014-4h1m4 0h5a4 4 0 010 8H7a4 4 0 01-4-4zm9-9l-3 3m0 0l-3-3m3 3V3" />

                                    </svg>

                                    <p class="text-sm font-medium text-slate-700">
                                        Upload Complaint Image
                                    </p>

                                    <p class="text-xs text-slate-400 mt-1">
                                        JPG, PNG, JPEG
                                    </p>

                                    <input type="file"
                                        accept="image/*"
                                        class="hidden"
                                        onchange="previewImage(event, ${index})" />

                                </label>

                            </div>

                            <!-- PREVIEW IMAGE -->

                            <img id="preview-${index}"
                                class="hidden w-full lg:w-[420px] h-52 object-cover rounded-2xl mt-4 border border-slate-200" />

                            <!-- INFO -->

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-5 text-sm">

                                <div class="bg-slate-50 rounded-xl p-3">
                                    <p class="text-slate-500">
                                        Citizen Name
                                    </p>

                                    <p class="font-semibold text-slate-800 mt-1">
                                        ${c.citizen}
                                    </p>
                                </div>

                                <div class="bg-slate-50 rounded-xl p-3">
                                    <p class="text-slate-500">
                                        Department
                                    </p>

                                    <p class="font-semibold text-slate-800 mt-1">
                                        ${c.department}
                                    </p>
                                </div>

                                <div class="bg-slate-50 rounded-xl p-3">
                                    <p class="text-slate-500">
                                        Status
                                    </p>

                                    <p class="
                                        font-semibold mt-1 capitalize

                                        ${c.status === 'pending'
                        ? 'text-yellow-600'
                        : ''}

                                        ${c.status === 'in progress'
                        ? 'text-blue-600'
                        : ''}

                                        ${c.status === 'resolved'
                        ? 'text-green-600'
                        : ''}
                                    ">
                                        ${c.status}
                                    </p>
                                </div>

                            </div>

                        </div>

                        <!-- RIGHT -->

                        <div class="w-full lg:w-60 space-y-3">

                            <select
                                class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500">

                                <option>Change Status</option>

                                <option ${c.status === 'pending' ? 'selected' : ''}>
                                    Pending
                                </option>

                                <option ${c.status === 'in progress' ? 'selected' : ''}>
                                    In Progress
                                </option>

                                <option ${c.status === 'resolved' ? 'selected' : ''}>
                                    Resolved
                                </option>

                            </select>

                            <textarea rows="4"
                                placeholder="Supervisor remarks..."
                                class="w-full border border-slate-300 rounded-xl p-3 text-sm resize-none focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500"></textarea>

                            <button
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-semibold transition">
                                Update Complaint
                            </button>

                        </div>

                    </div>

                </div>

            `).join('');
        }

        function previewImage(event, index) {

            const file =
                event.target.files[0];

            if (file) {

                const reader =
                    new FileReader();

                reader.onload =
                    function (e) {

                        const preview =
                            document.getElementById(
                                `preview-${index}`
                            );

                        preview.src =
                            e.target.result;

                        preview.classList.remove(
                            'hidden'
                        );
                    };

                reader.readAsDataURL(file);
            }
        }

        searchInput.addEventListener(
            'input',
            renderComplaints
        );

        statusFilter.addEventListener(
            'change',
            renderComplaints
        );

        priorityFilter.addEventListener(
            'change',
            renderComplaints
        );

        renderComplaints();

    </script>

</body>

</html>
